<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikael Papantoniou</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav id="navbar">
        <div class="nav-inner">
            <a href="#" class="nav-logo">MP</a>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-tab="about">About Me</a>
                <a href="#" class="nav-link" data-tab="roisin">Róisín</a>
                <a href="#" class="nav-link" data-tab="hobbies">Hobbies</a>
            </div>
        </div>
    </nav>

    <!-- ABOUT ME TAB -->
    <section id="tab-about" class="tab-content active">
        <div class="duality-container">

            <!-- LEFT: Dark / Logic side -->
            <div class="duality-half duality-dark">
                <div class="duality-items">

                    <div class="duality-item" style="--r: -2deg">
                        <!-- < / > code brackets -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 17 L10 28 L21 39" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="31" y1="39" x2="25" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M35 17 L46 28 L35 39" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>AI &amp; Coding</span>
                    </div>

                    <div class="duality-item" style="--r: 1.5deg">
                        <!-- π symbol with floating math -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 20 C17 19 39 21 46 20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M18 20 C18 28 16 36 15 44" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <path d="M36 20 C36 30 38 38 40 44" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                            <text x="5" y="16" font-size="9" fill="currentColor" opacity="0.45" font-family="Caveat,sans-serif">∞</text>
                            <text x="41" y="46" font-size="9" fill="currentColor" opacity="0.45" font-family="Caveat,sans-serif">x²</text>
                        </svg>
                        <span>Logic &amp; Maths</span>
                    </div>

                    <div class="duality-item" style="--r: -1deg">
                        <!-- circuit node -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <line x1="8" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="24" cy="20" r="4" stroke="currentColor" stroke-width="2"/>
                            <line x1="28" y1="20" x2="48" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="24" y1="24" x2="24" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <rect x="18" y="36" width="12" height="8" rx="1" stroke="currentColor" stroke-width="2"/>
                            <line x1="20" y1="40" x2="10" y2="40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="8" cy="40" r="2" fill="currentColor"/>
                            <line x1="30" y1="40" x2="40" y2="40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="42" cy="40" r="2" fill="currentColor"/>
                            <line x1="38" y1="20" x2="38" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="38" cy="10" r="2" fill="currentColor" opacity="0.5"/>
                        </svg>
                        <span>Technology</span>
                    </div>

                </div>
            </div>

            <!-- CENTER DIVIDER: photo circle sits on the split, name below -->
            <div class="duality-divider">
                <div class="divider-line"></div>
                <div class="divider-photo">
                    <img src="assets/images/mikael.jpg" alt="Mikael Papantoniou" id="profile-photo" onerror="this.style.display='none'">
                    <div class="photo-placeholder" id="photo-placeholder-mikael">MP</div>
                </div>
                <span class="divider-name">Mikael Papantoniou</span>
            </div>

            <!-- RIGHT: Light / Creative side -->
            <div class="duality-half duality-light">
                <div class="duality-items">

                    <div class="duality-item" style="--r: 2deg">
                        <!-- beamed music notes -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <ellipse cx="16" cy="40" rx="6" ry="4" transform="rotate(-20 16 40)" stroke="currentColor" stroke-width="2"/>
                            <line x1="22" y1="37" x2="22" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <ellipse cx="37" cy="34" rx="6" ry="4" transform="rotate(-20 37 34)" stroke="currentColor" stroke-width="2"/>
                            <line x1="43" y1="31" x2="43" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="22" y1="18" x2="43" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                        <span>Music</span>
                    </div>

                    <div class="duality-item" style="--r: -1.5deg">
                        <!-- paintbrush with a loose stroke below it -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <line x1="12" y1="10" x2="37" y2="35" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                            <path d="M37 35 C41 31 46 33 44 40 C42 46 37 48 33 44 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 48 C13 44 18 50 24 46 C29 43 32 48 37 45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>Art</span>
                    </div>

                    <div class="duality-item" style="--r: 1deg">
                        <!-- leaf with veins -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M28 48 C27 46 12 37 10 24 C8 14 16 8 28 8 C40 8 48 14 46 24 C44 37 29 46 28 48 Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="28" y1="48" x2="28" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="28" y1="30" x2="18" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            <line x1="28" y1="30" x2="38" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            <line x1="28" y1="38" x2="17" y2="33" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                            <line x1="28" y1="38" x2="39" y2="33" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                        <span>Nature</span>
                    </div>

                    <div class="duality-item" style="--r: -2deg">
                        <!-- two stick figures -->
                        <svg class="sketch-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="16" cy="11" r="5.5" stroke="currentColor" stroke-width="2"/>
                            <line x1="16" y1="17" x2="16" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="16" y1="23" x2="8" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="16" y1="23" x2="24" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="16" y1="32" x2="11" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="16" y1="32" x2="21" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="40" cy="11" r="5.5" stroke="currentColor" stroke-width="2"/>
                            <line x1="40" y1="17" x2="40" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="40" y1="23" x2="32" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="40" y1="23" x2="48" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="40" y1="32" x2="35" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="40" y1="32" x2="45" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>People</span>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <!-- RÓISÍN TAB -->
    <section id="tab-roisin" class="tab-content">
        <div class="roisin-container">
            <!-- Phase 1: Clean intro with couple photo -->
            <div class="roisin-intro" id="roisin-intro">
                <div class="couple-photo">
                    <img src="assets/images/couple.jpg" alt="Mikael and Róisín" id="couple-photo">
                    <div class="photo-placeholder" id="photo-placeholder-couple">Photo coming soon</div>
                </div>
                <h2>Róisín & Me</h2>
                <p class="roisin-subtitle">Click below to see something special.</p>
                <button id="start-animation" class="start-btn">Play</button>
            </div>

            <!-- Phase 2: Animation canvas -->
            <div class="animation-wrapper" id="animation-wrapper">
                <canvas id="moon-canvas"></canvas>
                <div class="reveal-text" id="reveal-text">
                    I love you to the moon and back
                </div>
            </div>
        </div>
    </section>

    <!-- HOBBIES TAB -->
    <section id="tab-hobbies" class="tab-content">
        <div class="hobbies-container">
            <h2>Hobbies</h2>
            <p class="hobbies-subtitle">More coming soon.</p>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
